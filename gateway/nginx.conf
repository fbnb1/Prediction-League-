worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # API gateway for the Prediction League platform.
    # Per-service reverse-proxy routes are added as each service lands:
    #   /api/ledger      -> ledger-service   (Phase 1)
    #   /api/fixture     -> fixture-service  (Phase 2)
    #   /api/prediction  -> prediction-service (Phase 3)

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        location = / {
            default_type application/json;
            return 200 '{"service":"prediction-league-gateway","routes":[]}';
        }
    }
}
