worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # API gateway for the Prediction League platform.
    # Per-service reverse-proxy routes:
    #   /api/ledger      -> ledger-service     (Phase 1)
    #   /api/fixture     -> fixture-service    (Phase 2)
    #   /api/prediction  -> prediction-service (Phase 3)
    #   /api/bff         -> bff-service        (aggregation reads)
    # The single-page web UI is served from /.

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # Static single-page web UI.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Docker's embedded DNS; lets nginx resolve service names at request
        # time so the gateway starts even before a backend service is up.
        resolver 127.0.0.11 valid=10s;

        location /api/ledger/ {
            set $ledger_upstream ledger-service:8080;
            rewrite ^/api/ledger/(.*)$ /$1 break;
            proxy_pass http://$ledger_upstream;
            proxy_set_header Host $host;
        }

        location /api/fixture/ {
            set $fixture_upstream fixture-service:8000;
            rewrite ^/api/fixture/(.*)$ /$1 break;
            proxy_pass http://$fixture_upstream;
            proxy_set_header Host $host;
        }

        location /api/prediction/ {
            set $prediction_upstream prediction-service:8000;
            rewrite ^/api/prediction/(.*)$ /$1 break;
            proxy_pass http://$prediction_upstream;
            proxy_set_header Host $host;
        }

        location /api/bff/ {
            set $bff_upstream bff-service:8000;
            rewrite ^/api/bff/(.*)$ /$1 break;
            proxy_pass http://$bff_upstream;
            proxy_set_header Host $host;
        }
    }
}
