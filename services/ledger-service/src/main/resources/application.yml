spring:
  application:
    name: ledger-service
  datasource:
    url: ${LEDGER_DB_URL:jdbc:postgresql://ledger-db:5432/ledger}
    username: ${LEDGER_DB_USER:ledger}
    password: ${LEDGER_DB_PASSWORD:ledger}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 4
          initial-interval: 2s
          multiplier: 2.0
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

ledger:
  admin-api-key: ${ADMIN_API_KEY:dev-admin-key-change-me}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
