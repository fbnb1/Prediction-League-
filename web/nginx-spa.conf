server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"web"}';
    }

    # SPA: unknown paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
